# All knobs for the generator, pipeline, and detection layer live here.
# Override the path with CLAIMS_MINER_CONFIG, or individual values with
# CLAIMS_MINER__SECTION__KEY environment variables (double underscore nesting).

generator:
  seed: 42
  n_claims: 10000
  start_date: "2025-01-01"
  end_date: "2025-06-30"
  # Fraction of claims that carry an injected, preventable error.
  # Ground-truth labels are written to a separate file so the detection
  # layer can be scored honestly without ever reading the labels as input.
  preventable_error_rate: 0.12
  # Fraction of clean claims the payer still denies for non-preventable
  # reasons (medical necessity disputes, timely filing edge cases). These
  # keep the dataset honest: not every denial is preventable.
  background_denial_rate: 0.04

paths:
  data_dir: "data"
  claims_file: "data/claims.parquet"
  remits_file: "data/remits.parquet"
  labels_file: "data/ground_truth_labels.parquet"
  duckdb_file: "data/claims_miner.duckdb"
  export_dir: "powerbi/export"

pipeline:
  # SQL models run in this order. Each maps to src/claims_miner/pipeline/models/<name>.sql
  model_order:
    - stg_claims
    - stg_remits
    - fct_denials
    - fct_leakage
    - mart_rcm_kpis

detection:
  # Minimum denied dollars for a payer x CARC x department cell to be
  # reported as a leakage pattern. Keeps the report actionable.
  min_pattern_dollars: 500.0
  min_pattern_claims: 3
